<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tradesphere Hub – Order Tracking</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg-primary: #0A0A0A;
            --bg-card: #141414;
            --bg-input: #1E1E1E;
            --border-color: #2A2A2A;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --accent-gold: #F59E0B;
            --accent-gold-hover: #D97706;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(0,0,0,0.5);
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { max-width: 900px; width:100%; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 16px;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 10px;
        }
        .logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .logo-icon {
            background: linear-gradient(135deg, var(--accent-gold), #FBBF24);
            color: #000; width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 800;
        }
        .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .logo-text span { color: var(--accent-gold); }
        .nav { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 8px;
            transition: 0.3s ease;
        }
        .nav a:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        .nav a.active { color: var(--accent-gold); background: rgba(245,158,11,0.1); }

        #authScreen {
            max-width: 420px;
            margin: 40px auto;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 32px 28px;
            box-shadow: var(--shadow);
        }
        #authScreen h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
        #authScreen p { color: var(--text-secondary); font-size: 14px; text-align: center; margin-bottom: 20px; }
        #authScreen input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            margin-bottom: 14px;
            transition: border 0.3s ease;
        }
        #authScreen input:focus { outline: none; border-color: var(--accent-gold); }
        #authScreen .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--accent-gold);
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        #authScreen .auth-btn:hover { background: var(--accent-gold-hover); transform: scale(1.01); }
        #authScreen .auth-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; display: none; }

        #dashboard { display: none; }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: border 0.3s ease;
        }
        .stat-card:hover { border-color: var(--accent-gold); }
        .stat-card .number { font-size: 24px; font-weight: 800; color: var(--accent-gold); }
        .stat-card .label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            flex: 1;
            padding: 12px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
        }
        .search-box input:focus { outline: none; border-color: var(--accent-gold); }

        .order-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 18px;
            margin-bottom: 14px;
            transition: all 0.3s ease;
        }
        .order-card:hover { border-color: var(--accent-gold); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .order-card .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 6px;
        }
        .order-card .order-id { font-weight: 700; font-size: 16px; }
        .order-card .order-date { color: var(--text-secondary); font-size: 13px; }
        .order-card .details {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        .order-card .details .flag { font-size: 20px; }
        .order-card .details .type { font-weight: 600; color: var(--text-primary); }
        .order-card .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .order-card .status.active { background: rgba(16,185,129,0.15); color: var(--success); }
        .order-card .status.expired { background: rgba(239,68,68,0.1); color: var(--danger); }
        .order-card .status.pending { background: rgba(245,158,11,0.15); color: var(--warning); }
        .order-card .status.used { background: rgba(255,255,255,0.05); color: var(--text-secondary); }
        .order-card .view-btn {
            margin-top: 10px;
            padding: 8px 18px;
            background: var(--accent-gold);
            color: #000;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .order-card .view-btn:hover { background: var(--accent-gold-hover); transform: scale(1.02); }
        .order-card .views-info {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state h3 { font-size: 18px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .empty-state p { font-size: 14px; }
        .footer {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
        }
        @media (max-width: 768px) {
            .stats { grid-template-columns: 1fr 1fr; }
            .order-card .top-row { flex-direction: column; align-items: flex-start; }
            .search-box { flex-direction: column; }
        }
        @media (max-width: 480px) {
            .stat-card .number { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">

        <header class="header">
            <div class="logo" onclick="window.location.reload()">
                <div class="logo-icon">TS</div>
                <div class="logo-text">Tradesphere<span>Hub</span></div>
            </div>
            <nav class="nav">
                <a href="/index.html">🏠 Home</a>
                <a href="/portal.html">📦 Portal</a>
                <a class="active" href="#">📊 Tracking</a>
            </nav>
        </header>

        <div id="authScreen">
            <h2>🔍 Order Tracking</h2>
            <p>Enter your email to track your orders.</p>
            <input type="email" id="clientEmail" placeholder="Enter your email address..." />
            <button class="auth-btn" id="trackBtn">Track Orders</button>
            <div class="auth-error" id="authError">No orders found for this email. Please check and try again.</div>
        </div>

        <div id="dashboard">

            <div class="stats" id="statsBar">
                <div class="stat-card">
                    <div class="number" id="totalOrders">0</div>
                    <div class="label">Total Orders</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="activeOrders">0</div>
                    <div class="label">Active</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="expiredOrders">0</div>
                    <div class="label">Expired</div>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search orders by ID, type, or date..." />
            </div>

            <div id="orderList"></div>
        </div>

        <div class="footer">
            <p>© 2026 Tradesphere Hub · Order Tracking · v1.0</p>
        </div>

    </div>

    <script>
        (function() {
            'use strict';

            const authScreen = document.getElementById('authScreen');
            const dashboard = document.getElementById('dashboard');
            const clientEmail = document.getElementById('clientEmail');
            const trackBtn = document.getElementById('trackBtn');
            const authError = document.getElementById('authError');
            const orderList = document.getElementById('orderList');
            const searchInput = document.getElementById('searchInput');
            const totalOrders = document.getElementById('totalOrders');
            const activeOrders = document.getElementById('activeOrders');
            const expiredOrders = document.getElementById('expiredOrders');

            let orders = [];
            let currentEmail = '';

            function formatDate(ts) { if (!ts) return 'N/A'; return new Date(ts).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }); }

            function getFlag(type) {
                if (type && type.includes('TikTok')) return '🇩🇰';
                if (type && type.includes('Facebook')) return '🇺🇸';
                if (type && type.includes('Instagram')) return '🇬🇧';
                return '📄';
            }

            function getStatus(expiryDate, isUsed) {
                if (isUsed) return { label: 'Used', class: 'used' };
                if (!expiryDate) return { label: 'Active', class: 'active' };
                if (Date.now() > expiryDate) return { label: 'Expired', class: 'expired' };
                return { label: 'Active', class: 'active' };
            }

            function isExpired(expiryDate) {
                if (!expiryDate || expiryDate === 0) return false;
                return Date.now() > expiryDate;
            }

            function loadOrders(email) {
                let clients = [];
                try {
                    const data = localStorage.getItem('tradesphere_clients_v3');
                    if (data) clients = JSON.parse(data);
                } catch (e) { clients = []; }

                const clientOrders = [];
                for (let i = 0; i < clients.length; i++) {
                    const c = clients[i];
                    if (c.email && c.email.toLowerCase() === email.toLowerCase()) {
                        if (c.logs && c.logs.length > 0) {
                            for (let j = 0; j < c.logs.length; j++) {
                                const log = c.logs[j];
                                const hasExpiry = c.expiryDays && c.expiryDays > 0;
                                const expiryDate = hasExpiry ? c.createdAt + (c.expiryDays * 86400000) : 0;
                                clientOrders.push({
                                    id: log.id || 'order_' + j,
                                    clientId: c.id,
                                    clientName: c.name,
                                    email: c.email,
                                    orderDate: log.uploadedAt || c.createdAt,
                                    type: log.filename || 'Log',
                                    content: log.content || '',
                                    views: log.views || 0,
                                    lastViewed: log.lastViewed || null,
                                    expiryDays: c.expiryDays || 0,
                                    expiryDate: expiryDate,
                                    isUsed: false
                                });
                            }
                        }
                    }
                }
                return clientOrders;
            }

            function renderDashboard(email) {
                orders = loadOrders(email);
                currentEmail = email;

                if (orders.length === 0) {
                    authError.style.display = 'block';
                    return;
                }

                authError.style.display = 'none';
                authScreen.style.display = 'none';
                dashboard.style.display = 'block';

                const total = orders.length;
                const active = orders.filter(o => !isExpired(o.expiryDate) && !o.isUsed).length;
                const expired = orders.filter(o => isExpired(o.expiryDate) || o.isUsed).length;

                totalOrders.textContent = total;
                activeOrders.textContent = active;
                expiredOrders.textContent = expired;

                renderOrders(orders);
            }

            function renderOrders(orderListData) {
                const searchQuery = searchInput.value.toLowerCase().trim();
                let filtered = orderListData;
                if (searchQuery) {
                    filtered = orderListData.filter(o =>
                        o.clientName.toLowerCase().includes(searchQuery) ||
                        o.type.toLowerCase().includes(searchQuery) ||
                        o.id.toLowerCase().includes(searchQuery) ||
                        formatDate(o.orderDate).toLowerCase().includes(searchQuery)
                    );
                }

                if (filtered.length === 0) {
                    orderList.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><h3>No Orders Found</h3><p>Try adjusting your search.</p></div>';
                    return;
                }

                let html = '';
                for (let i = 0; i < filtered.length; i++) {
                    const o = filtered[i];
                    const status = getStatus(o.expiryDate, o.isUsed);
                    const flag = getFlag(o.type);
                    const isExp = isExpired(o.expiryDate);

                    html += `
                        <div class="order-card">
                            <div class="top-row">
                                <span class="order-id">${flag} ${escapeHtml(o.type)}</span>
                                <span class="order-date">📅 ${formatDate(o.orderDate)}</span>
                            </div>
                            <div class="details">
                                <span>👤 ${escapeHtml(o.clientName)}</span>
                                <span>📧 ${escapeHtml(o.email)}</span>
                                <span>👁️ ${o.views} view(s)</span>
                            </div>
                            <div>
                                <span class="status ${status.class}">${status.label}</span>
                                ${isExp ? ' <span style="font-size:12px;color:var(--danger);">⚠️ Expired</span>' : ''}
                                ${o.lastViewed ? `<span class="views-info">Last viewed: ${formatDate(o.lastViewed)}</span>` : ''}
                            </div>
                            <button class="view-btn" data-client="${o.clientId}">🔓 View Log</button>
                        </div>
                    `;
                }

                orderList.innerHTML = html;

                document.querySelectorAll('.view-btn').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        const clientId = this.dataset.client;
                        window.location.href = '/portal.html?client=' + clientId;
                    });
                });
            }

            function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

            trackBtn.addEventListener('click', function() {
                const email = clientEmail.value.trim();
                if (!email) {
                    authError.textContent = 'Please enter your email address.';
                    authError.style.display = 'block';
                    return;
                }
                renderDashboard(email);
            });

            clientEmail.addEventListener('keydown', function(e) { if (e.key === 'Enter') trackBtn.click(); });
            searchInput.addEventListener('input', function() { renderOrders(orders); });

            function init() {
                const params = new URLSearchParams(window.location.search);
                const email = params.get('email');
                if (email) {
                    clientEmail.value = email;
                    renderDashboard(email);
                }
            }

            init();
            console.log('📊 Order Tracking loaded');

        })();
    </script>

</body>
</html>
